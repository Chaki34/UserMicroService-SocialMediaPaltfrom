<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialConnect | Account Setup</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container & Transitions */
        .app-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 800px;
            min-height: 500px;
            border-radius: 28px;
            border: 1px solid white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .step-container { display: none; padding: 40px; animation: fadeIn 0.5s ease-out forwards; }
        .step-container.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Progress Bar */
        .progress-track {
            height: 6px; background: #e2e8f0; width: 100%; position: relative;
        }
        #progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), #a855f7);
            width: 33%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Typography */
        h1 { font-size: 28px; color: #1e293b; font-weight: 700; margin-bottom: 8px; }
        p.subtitle { color: var(--secondary); margin-bottom: 32px; font-size: 15px; }

        /* Form Styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid var(--border);
            background: white; font-size: 15px; transition: all 0.2s; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        /* Error Message Guide */
        #error-guide {
            display: none; background: #fff1f2; border-left: 4px solid var(--danger);
            padding: 16px; margin: 0 40px 20px; border-radius: 8px; color: #991b1b;
            font-size: 14px; font-weight: 500;
        }

        /* Buttons */
        .btn {
            padding: 14px 28px; border-radius: 14px; border: none; font-weight: 700;
            cursor: pointer; transition: all 0.3s; font-size: 15px; display: inline-flex;
            align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .btn-outline { background: white; border: 1.5px solid var(--border); color: #1e293b; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Profile View Styling */
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar-box {
            width: 120px; height: 120px; border-radius: 40px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; color: white; box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.2);
            overflow: hidden;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .info-pill {
            background: #f1f5f9; padding: 6px 12px; border-radius: 8px; font-size: 13px;
            font-weight: 600; color: #475569; display: inline-block; margin: 4px;
        }

        /* Loader */
        .loader { width: 18px; height: 18px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-track"><div id="progress-fill"></div></div>

    <div id="error-guide"></div>

    <!-- STEP 1: CREATE ACCOUNT -->
    <div id="step-1" class="step-container active">
        <h1>Join SocialConnect</h1>
        <p class="subtitle">Create your unique identifier to get started.</p>
        <form id="createForm">
            <div class="input-group">
                <label><i class="fa-solid fa-at"></i> Username</label>
                <input type="text" id="username" placeholder="e.g. alex_p" required>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="alex@example.com" required>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                <input type="text" id="phoneNumber" placeholder="e.g. 1234567890">
            </div>
            <button type="submit" class="btn btn-primary">
                <span>Create My Account</span>
                <div class="loader"></div>
            </button>
        </form>
    </div>

    <!-- STEP 2: PROFILE SETUP -->
    <div id="step-2" class="step-container">
        <h1>Setup Your Profile</h1>
        <p class="subtitle">Personalize how others see you on the platform.</p>
        <form id="setupForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="MALE">Male</option>
                        <option value="FEMALE">Female</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dateOfBirth">
                </div>
                <div class="input-group">
                    <label>Country</label>
                    <input type="text" id="country">
                </div>
                <div class="input-group">
                    <label>Language</label>
                    <input type="text" id="language" placeholder="English">
                </div>
                <div class="input-group full-width">
                    <label>Profile Image URL</label>
                    <input type="url" id="profileImage" placeholder="https://image-url.com/photo.jpg">
                </div>
                <div class="input-group full-width">
                    <label>About Bio</label>
                    <textarea id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">
                <span>Complete Profile</span>
                <div class="loader"></div>
            </button>
        </form>
    </div>

    <!-- STEP 3: PROFILE VIEW -->
    <div id="step-3" class="step-container">
        <div class="profile-header">
            <div class="avatar-box" id="view-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <h1 id="view-fullname">Full Name</h1>
            <p style="color: var(--primary); font-weight: 700;" id="view-username-tag">@username</p>
        </div>

        <div style="background: white; border-radius: 20px; padding: 25px; border: 1.5px solid var(--border); margin-bottom: 30px;">
            <div id="view-bio-box" style="margin-bottom: 20px; line-height: 1.6; color: #334155;"></div>
            <div id="pills-container">
                <!-- Location, Gender, etc will go here as pills -->
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button onclick="startApp()" class="btn btn-primary full-width" style="grid-column: span 2;">
                <i class="fa-solid fa-rocket"></i> Let's Start
            </button>
            <button onclick="showUpdateUI()" class="btn btn-outline">
                <i class="fa-solid fa-pen-to-square"></i> Update
            </button>
            <button onclick="handleDelete()" class="btn btn-danger">
                <i class="fa-solid fa-trash"></i> Delete
            </button>
        </div>
    </div>
</div>

<script>
    let currentUserUuid = null;
    const API_BASE = '/api/v1/users';

    // Helper: UI Navigation
    function showStep(step) {
        document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
        document.getElementById(`step-${step}`).classList.add('active');
        document.getElementById('progress-fill').style.width = (step === 1 ? '33%' : step === 2 ? '66%' : '100%');
        document.getElementById('error-guide').style.display = 'none';
    }

    // Helper: Error Handling
    function displayError(msg) {
        const errorEl = document.getElementById('error-guide');
        errorEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
        errorEl.style.display = 'block';
        window.scrollTo(0,0);
    }

    // Helper: Button Loading
    function setBtnLoading(formId, isLoading) {
        const btn = document.querySelector(`#${formId} button`);
        btn.disabled = isLoading;
        btn.querySelector('span').style.display = isLoading ? 'none' : 'inline';
        btn.querySelector('.loader').style.display = isLoading ? 'inline-block' : 'none';
    }

    // CREATE USER (Step 1)
    document.getElementById('createForm').onsubmit = async (e) => {
        e.preventDefault();
        setBtnLoading('createForm', true);

        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phoneNumber: document.getElementById('phoneNumber').value
        };

        try {
            const res = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                currentUserUuid = data.userUuid;
                showStep(2);
            } else {
                displayError(data.message || "Email or Username already taken");
            }
        } catch (err) { displayError("Network error. Check server."); }
        finally { setBtnLoading('createForm', false); }
    };

    // SETUP PROFILE (Step 2)
    document.getElementById('setupForm').onsubmit = async (e) => {
        e.preventDefault();
        setBtnLoading('setupForm', true);

        const payload = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            bio: document.getElementById('bio').value,
            gender: document.getElementById('gender').value,
            dateOfBirth: document.getElementById('dateOfBirth').value,
            country: document.getElementById('country').value,
            language: document.getElementById('language').value,
            profileImage: document.getElementById('profileImage').value
        };

        try {
            const res = await fetch(`${API_BASE}/${currentUserUuid}/profile`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                renderProfileView(data);
                showStep(3);
            } else {
                displayError(data.message || "Failed to update profile details.");
            }
        } catch (err) { displayError("Network error."); }
        finally { setBtnLoading('setupForm', false); }
    };

    // RENDER FINAL VIEW
    function renderProfileView(user) {
        document.getElementById('view-fullname').innerText = `${user.firstName} ${user.lastName}`;
        document.getElementById('view-username-tag').innerText = `@${user.username}`;
        document.getElementById('view-bio-box').innerText = user.bio || "No bio available.";

        const avatarBox = document.getElementById('view-avatar');
        if(user.profileImage) {
            avatarBox.innerHTML = `<img src="${user.profileImage}" alt="profile">`;
        } else {
            avatarBox.innerHTML = `<i class="fa-solid fa-user"></i>`;
        }

        const pills = document.getElementById('pills-container');
        pills.innerHTML = `
            <span class="info-pill"><i class="fa-solid fa-envelope"></i> ${user.email}</span>
            <span class="info-pill"><i class="fa-solid fa-venus-mars"></i> ${user.gender}</span>
            <span class="info-pill"><i class="fa-solid fa-earth-americas"></i> ${user.country || 'N/A'}</span>
            <span class="info-pill"><i class="fa-solid fa-language"></i> ${user.language || 'English'}</span>
        `;
    }

    // ACTIONS (Update / Delete / Start)
    function showUpdateUI() {
        showStep(2); // In a real app, pre-fill data using currentUserUuid fetch
    }

    async function handleDelete() {
        if(confirm("Permanently delete your profile? This cannot be undone.")) {
            const res = await fetch(`${API_BASE}/${currentUserUuid}`, { method: 'DELETE' });
            if(res.ok) {
                alert("Account deleted.");
                location.reload();
            }
        }
    }

    function startApp() {
        alert("Redirecting to your Social Feed...");
    }
</script>
</body>
</html>
