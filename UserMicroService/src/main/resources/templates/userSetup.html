<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialConnect | Premium Account Setup</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #f43f5e;
            --secondary: #64748b;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.5);
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Three.js Canvas Container */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        /* Glassmorphism Card */
        .app-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 900px;
            border-radius: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .progress-bar {
            height: 8px;
            background: rgba(0,0,0,0.05);
            width: 100%;
        }
        #progress-fill {
            height: 100%;
            background: var(--gradient);
            width: 33%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .section { display: none; padding: 3.5rem; animation: fadeIn 0.6s ease-out; }
        .section.active { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography */
        h1 { font-size: 2.5rem; color: var(--dark); font-weight: 800; line-height: 1.1; margin-bottom: 1rem; }
        .subtitle { color: var(--secondary); margin-bottom: 2rem; font-size: 1.1rem; line-height: 1.5; }

        /* Inputs */
        .field-group { margin-bottom: 1.5rem; position: relative; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--dark); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; }

        input, select, textarea {
            width: 100%; padding: 1rem 1.2rem; border-radius: 1rem; border: 2px solid #e2e8f0;
            background: rgba(255,255,255,0.8); font-size: 1rem; transition: all 0.3s; outline: none;
            color: var(--dark);
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* Image Helper for Sections */
        .section-visual {
            background: var(--gradient);
            height: 100%;
            min-height: 400px;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .section-visual img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; mix-blend-mode: luminosity; }

        /* Custom Upload Zone */
        .upload-zone {
            border: 2px dashed var(--primary); border-radius: 1.5rem; padding: 2rem;
            text-align: center; cursor: pointer; transition: 0.3s; background: rgba(99, 102, 241, 0.05);
        }
        .upload-zone:hover { background: rgba(99, 102, 241, 0.1); transform: scale(1.02); }
        .preview-circle {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 1rem;
            background: white; display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-size: 2.5rem; color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 4px solid white;
        }
        .preview-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons */
        .btn {
            padding: 1rem 2rem; border-radius: 1.2rem; border: none; font-weight: 700;
            cursor: pointer; transition: all 0.3s; font-size: 1rem;
            display: inline-flex; align-items: center; justify-content: center; gap: 0.8rem;
        }
        .btn-primary { background: var(--gradient); color: white; width: 100%; box-shadow: 0 10px 20px var(--primary-glow); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--primary-glow); }

        .btn-secondary { background: white; color: var(--dark); border: 2px solid #e2e8f0; }
        .btn-danger { background: #fff1f2; color: var(--accent); border: 2px solid #fee2e2; }

        /* Error Banner */
        #error-banner {
            display: none; background: #fff1f2; border-left: 5px solid var(--accent);
            padding: 1rem 2rem; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; border-radius: 1rem; color: #991b1b; font-weight: 600;
        }

        /* Profile View Styling */
        #step-3.active { display: block; text-align: center; max-width: 700px; margin: 0 auto; }
        .profile-header { position: relative; margin-bottom: 3rem; }
        .view-banner { height: 150px; background: var(--gradient); border-radius: 2rem; margin-bottom: -60px; }
        .pill { background: white; padding: 0.6rem 1.2rem; border-radius: 50px; font-size: 0.85rem; font-weight: 700; color: var(--secondary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 850px) {
            .section.active { grid-template-columns: 1fr; }
            .section-visual { display: none; }
            .app-card { border-radius: 0; min-height: 100vh; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="error-banner"></div>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <!-- STEP 1: CREATE ACCOUNT -->
    <div id="step-1" class="section active">
        <div class="section-content">
            <h1>Start Your Journey.</h1>
            <p class="subtitle">Join our professional network of developers and creators today.</p>
            <form id="form-create">
                <div class="field-group">
                    <label>Unique Username</label>
                    <input type="text" id="reg-username" placeholder="@username" required minlength="3">
                </div>
                <div class="field-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="name@company.com" required>
                </div>
                <div class="field-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="+1 (555) 000-0000">
                </div>
                <button type="submit" class="btn btn-primary">
                    <span>Create My Account</span>
                    <i class="fa-solid fa-arrow-right"></i>
                    <div class="loader"></div>
                </button>
            </form>
        </div>
        <div class="section-visual">
            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80" alt="Social">
        </div>
    </div>

    <!-- STEP 2: PROFILE SETUP -->
    <div id="step-2" class="section">
        <div class="section-visual">
            <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=800&q=80" alt="Team">
        </div>
        <div class="section-content">
            <h1>Personalize.</h1>
            <p class="subtitle">Let the world know who you are.</p>
            <form id="form-setup">
                <div class="field-group" style="margin-bottom: 2rem;">
                    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                        <div class="preview-circle" id="image-preview"><i class="fa-solid fa-user"></i></div>
                        <p style="font-weight: 800; font-size: 0.9rem; color: var(--primary);">UPLOAD PHOTO</p>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="field-group">
                        <label>First Name</label>
                        <input type="text" id="setup-fname" required>
                    </div>
                    <div class="field-group">
                        <label>Last Name</label>
                        <input type="text" id="setup-lname" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="field-group">
                        <label>Gender</label>
                        <select id="setup-gender">
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Birth Date</label>
                        <input type="date" id="setup-dob">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="field-group">
                        <label>Country</label>
                        <input type="text" id="setup-country" placeholder="USA">
                    </div>
                    <div class="field-group">
                        <label>City</label>
                        <input type="text" id="setup-city" placeholder="New York">
                    </div>
                </div>

                <!-- Hidden parameters as per your requirement -->
                <input type="hidden" id="setup-state">
                <input type="hidden" id="setup-lang" value="English">

                <div class="field-group">
                    <label>Professional Bio</label>
                    <textarea id="setup-bio" rows="2" placeholder="Tell us about your passions..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    <span>Finish Setup</span>
                    <i class="fa-solid fa-check-circle"></i>
                    <div class="loader"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- STEP 3: FINAL PROFILE VIEW -->
    <div id="step-3" class="section">
        <div class="profile-header">
            <div class="view-banner"></div>
            <div class="preview-circle" id="view-avatar" style="width: 140px; height: 140px; margin-top: -70px; border: 6px solid white;"></div>
            <h1 id="view-name" style="margin-top: 1rem; margin-bottom: 0.2rem;"></h1>
            <p id="view-handle" style="color: var(--primary); font-weight: 800; font-size: 1.2rem;"></p>

            <div style="display: flex; justify-content: center; gap: 10px; margin: 1.5rem 0;" id="view-pills"></div>
        </div>

        <div style="background: white; padding: 2rem; border-radius: 1.5rem; margin-bottom: 2.5rem; text-align: left; border: 1px solid #e2e8f0;">
            <label style="color: var(--secondary);">About Me</label>
            <p id="view-bio" style="font-size: 1.1rem; line-height: 1.6; color: var(--dark);"></p>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem;">
            <button onclick="startApp()" class="btn btn-primary"><i class="fa-solid fa-rocket"></i> Launch Dashboard</button>
            <button onclick="showUpdate()" class="btn btn-secondary">Edit</button>
            <button onclick="confirmDelete()" class="btn btn-danger">Delete</button>
        </div>
    </div>
</div>

<script>
    /* --- THREE.JS BACKGROUND --- */
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const particlesGeometry = new THREE.BufferGeometry();
    const posArr = new Float32Array(1500 * 3);
    for(let i=0; i < 4500; i++) posArr[i] = (Math.random() - 0.5) * 10;
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const material = new THREE.PointsMaterial({ size: 0.015, color: 0x6366f1 });
    const particlesMesh = new THREE.Points(particlesGeometry, material);
    scene.add(particlesMesh);

    // Add floating icons (represented by simple shapes for performance)
    const shapes = [];
    const geometry = new THREE.IcosahedronGeometry(0.2, 0);
    for(let i=0; i<15; i++) {
        const mat = new THREE.MeshPhongMaterial({ color: i % 2 === 0 ? 0xf43f5e : 0x6366f1, wireframe: true });
        const mesh = new THREE.Mesh(geometry, mat);
        mesh.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
        scene.add(mesh);
        shapes.push(mesh);
    }
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(2, 3, 5);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));
    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        particlesMesh.rotation.y += 0.001;
        shapes.forEach(s => { s.rotation.x += 0.01; s.rotation.y += 0.01; s.position.y += Math.sin(Date.now()*0.001)*0.002; });
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* --- APPLICATION LOGIC --- */
    let currentUserUuid = null;
    let base64Image = "";
    const API_BASE = '/api/v1/users';

    const toggleStep = (step) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${step}`).classList.add('active');
        document.getElementById('progress-fill').style.width = step === 1 ? '33%' : step === 2 ? '66%' : '100%';
    };

    const setBtnLoading = (step, isLoading) => {
        const btn = document.querySelector(`#step-${step} button[type="submit"]`);
        if(!btn) return;
        btn.disabled = isLoading;
        btn.querySelector('span').style.display = isLoading ? 'none' : 'block';
        if(btn.querySelector('i')) btn.querySelector('i').style.display = isLoading ? 'none' : 'block';
        btn.querySelector('.loader').style.display = isLoading ? 'block' : 'none';
    };

    const showError = (msg) => {
        const banner = document.getElementById('error-banner');
        banner.innerText = msg;
        banner.style.display = 'block';
        setTimeout(() => banner.style.display = 'none', 5000);
    };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const fullBase64 = event.target.result;
                base64Image = fullBase64.split(',')[1];
                document.getElementById('image-preview').innerHTML = `<img src="${fullBase64}">`;
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('form-create').onsubmit = async (e) => {
        e.preventDefault();
        setBtnLoading(1, true);
        const payload = {
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            phoneNumber: document.getElementById('reg-phone').value
        };
        try {
            const res = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok) { currentUserUuid = data.userUuid; toggleStep(2); }
            else { showError(data.message || "Account exists or invalid data."); }
        } catch (err) { showError("Connection error."); }
        finally { setBtnLoading(1, false); }
    };

    document.getElementById('form-setup').onsubmit = async (e) => {
        e.preventDefault();
        setBtnLoading(2, true);
        const payload = {
            firstName: document.getElementById('setup-fname').value,
            lastName: document.getElementById('setup-lname').value,
            bio: document.getElementById('setup-bio').value,
            gender: document.getElementById('setup-gender').value,
            dateOfBirth: document.getElementById('setup-dob').value,
            country: document.getElementById('setup-country').value,
            state: document.getElementById('setup-state').value || "N/A",
            city: document.getElementById('setup-city').value,
            language: document.getElementById('setup-lang').value,
            profileImage: base64Image
        };
        try {
            const res = await fetch(`${API_BASE}/${currentUserUuid}/profile`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok) { renderProfile(data); toggleStep(3); }
            else { showError("Could not save profile."); }
        } catch (err) { showError("Server error."); }
        finally { setBtnLoading(2, false); }
    };

    const renderProfile = (user) => {
        document.getElementById('view-name').innerText = `${user.firstName} ${user.lastName}`;
        document.getElementById('view-handle').innerText = `@${user.username}`;
        document.getElementById('view-bio').innerText = user.bio || "No professional bio provided yet.";
        const avatar = document.getElementById('view-avatar');
        avatar.innerHTML = user.profileImage ? `<img src="data:image/png;base64,${user.profileImage}">` : `<i class="fa-solid fa-user"></i>`;
        const pills = document.getElementById('view-pills');
        pills.innerHTML = `
            <div class="pill"><i class="fa-solid fa-earth-americas"></i> ${user.country}</div>
            <div class="pill"><i class="fa-solid fa-mars-double"></i> ${user.gender}</div>
            <div class="pill"><i class="fa-solid fa-id-badge"></i> Verified</div>
        `;
    };

    function showUpdate() { toggleStep(2); }
    function startApp() { alert("Welcome to SocialConnect Pro!"); }
    async function confirmDelete() {
        if (confirm("Permanently delete this professional profile?")) {
            await fetch(`${API_BASE}/${currentUserUuid}`, { method: 'DELETE' });
            location.reload();
        }
    }
</script>
</body>
</html>
